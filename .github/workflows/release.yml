name: Release

# Builds the installers on each native OS and attaches them to a GitHub Release.
# A macOS .dmg must be built on macOS and a Windows .exe/.msi on Windows — that's why
# this runs a per-OS matrix instead of cross-compiling.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# or run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal macOS binary — runs NATIVELY on both Apple Silicon and Intel, so installs are
          # never the "Intel app" that macOS warns is being deprecated. (Built by lipo-merging both arch
          # slices; the toolchain step below installs both apple targets.)
          # `lto`/`cgu` override [profile.release] per platform: Win/macOS keep the size-tuned full LTO
          # (codegen-units=1); the ubuntu runner has only ~7GB RAM, where that profile OOMs during codegen,
          # so Linux uses thin LTO + more codegen units to stay under the cap (slightly larger binary).
          - platform: macos-latest # Universal macOS (.dmg / .app)
            args: "--target universal-apple-darwin"
            lto: "fat"
            cgu: "1"
          - platform: ubuntu-22.04 # Linux (.AppImage / .deb)
            args: ""
            lto: "thin"
            cgu: "16"
          - platform: windows-latest # Windows (.msi / NSIS .exe)
            args: ""
            lto: "fat"
            cgu: "1"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the tag's annotation/history to build the release notes

      - name: Build release notes from the tag
        id: notes
        shell: bash
        run: |
          # The "what changed" changelog is the tag's message (annotated tag, or the tagged commit's
          # message for a lightweight tag) — we write the bullets there when cutting a release.
          NOTES="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          [ -z "$NOTES" ] && NOTES="$(git log -1 --pretty=%B "$GITHUB_REF_NAME")"
          NOTES="$(printf '%s\n' "$NOTES" | sed -E '/^(Co-Authored-By|Signed-off-by):/d')"
          {
            echo 'body<<__NOTES_EOF__'
            printf '%s\n' "$NOTES"
            echo
            echo '---'
            echo 'Download the installer for your platform below, then run it — no separate install needed.'
            echo '__NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc" # pin to the dev Node (24 / npm 11) so the lockfile can't drift across npm majors

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sign the update artifacts so the in-app updater will accept them, and generate/merge the
          # `latest.json` manifest the updater fetches. Set these two repo secrets (private key from
          # `tauri signer generate`); without them the build still produces installers but no updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Per-platform [profile.release] override (see the matrix): lighter LTO on Linux so the
          # 7GB ubuntu runner doesn't OOM during codegen; full LTO (size-tuned) on Win/macOS.
          CARGO_PROFILE_RELEASE_LTO: ${{ matrix.lto }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ matrix.cgu }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pushin ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          # Publish immediately (not a draft) so GitHub's `releases/latest/...` resolves to it and the
          # in-app updater can fetch `latest.json`. Each matrix job uploads its platform's installer +
          # signed manifest to this same release; the per-OS jobs may land a few minutes apart, so a
          # client checking mid-publish just sees the platforms already uploaded (and updates once its
          # own appears). `prerelease: false` keeps it eligible to be the "latest" release.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
