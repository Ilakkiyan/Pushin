name: tests

on:
  push:
    branches: [main, Working-Branch]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps (the lib links webkit2gtk)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev build-essential
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # --lib runs the unit + httpmock integration tests; the live `llm_eval` battery is excluded
      # (it needs a running model) and stays a manual gate.
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  frontend:
    name: Frontend unit + component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

  e2e:
    name: Mocked-IPC E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
